DWAPlannerROS:

# ====================== 一、机器人运动配置参数 ======================
# 参考底盘：Kobuki差速底盘
  # X方向最大线速度（前进），单位：m/s
  max_vel_x: 0.60
  # X方向最小线速度（后退），单位：m/s
  min_vel_x: -0.60

  # Y方向最大线速度（左右平移，仅全向机器人可用）
  max_vel_y: 0.50
  # Y方向最小线速度
  min_vel_y: -0.50

  # 合成最大平移速度（控制整体快慢）
  max_vel_trans: 0.4 
  # 最小平移速度（低于该速度不移动）
  min_vel_trans: 0.05  

  # 最大旋转角速度，单位：rad/s（数值越大转向越快）
  max_vel_theta: 2.5 
  # 最小旋转角速度
  min_vel_theta: 1 
  
  # X方向线加速度限制（加减速快慢）
  acc_lim_x: 2.5 
  # 旋转角加速度限制（转向加减速）
  acc_lim_theta: 3.0
  # Y方向加速度限制（仅全向机器人）
  acc_lim_y: 2.5 

  # 位置目标容忍度（到达目标点的误差范围，单位：m）
  # 0.01=1厘米，精度极高，仿真可用，实物容易抖动
  xy_goal_tolerance: 0.04
  # 角度目标容忍度（单位：rad）
  yaw_goal_tolerance: 0.04
  # 是否锁定位置容忍度（一般关闭）
  latch_xy_goal_tolerance: false

# ====================== 二、前向仿真参数 ======================
# 核心：DWA会预测未来一段时间的轨迹，选择最优路径
  # 前向仿真时间（预测未来2秒的轨迹）
  sim_time: 2.0       
  # X方向速度采样数量（数值越高，轨迹规划越细，越耗性能）
  vx_samples: 10      
  # Y方向速度采样（差速机器人不能左右平移，必须设为0）
  vy_samples: 10 
  # 角速度采样数量
  vth_samples: 20
  # 控制器运行频率（单位：Hz）
  controller_frequency: 10.0

# ====================== 三、轨迹评分参数 ======================
# 核心：给不同规则分配权重，决定机器人「更贴路径/更靠近目标/更避障」
  # 贴近全局路径的权重（数值越高，越严格跟着全局路径走）
  path_distance_bias: 28.0     
  # 靠近目标点的权重（数值越高，越优先冲向终点）
  goal_distance_bias: 28.0    
  # 避障权重（数值越高，避障越保守，离障碍物越远）
  occdist_scale: 1.0       
  # 前向点距离（计算轨迹前向参考点的距离）
  forward_point_distance: 0.325 
  # 停止时间缓冲（防止急停）
  stop_time_buffer: 0.2  
  # 缩放速度（障碍物检测的速度阈值）
  scaling_speed: 0.25   
  # 最大缩放因子（避障时的速度衰减比例）
  max_scaling_factor: 0.2 

# ====================== 四、防震荡参数 ======================
# 防止机器人在原地来回晃、走不动
  # 防震荡重置距离（移动超过0.05m，清除震荡标记）
  oscillation_reset_dist: 0.1  

# ====================== 五、调试可视化参数 ======================
  # 发布规划轨迹点云（RVIZ可视化）
  publish_traj_pc : true
  # 发布代价地图点云（RVIZ可视化）
  publish_cost_grid_pc: true

# ====================== 六、机器人类型配置（关键！） ======================
# 全向机器人（麦轮/全向轮）：true
# 差速机器人（两轮小车，你现在的车型）：false
# 你当前配置错误！差速小车必须设为 false
  holonomic_robot: true